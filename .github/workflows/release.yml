name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm build

      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc-mingw-w64-x86-64 nsis

      - name: Build Windows binary for installer
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o fracture-windows-amd64.exe .

      - name: Build Windows installer
        run: |
          cp fracture-windows-amd64.exe installer/
          cp README.md LICENSE INSTALL.md installer/
          cd installer && makensis windows.nsi

      - name: Build launcher Windows
        run: |
          cd launcher
          go mod tidy
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
            go build -ldflags="-H windowsgui" -o FRACTURE-Launcher-Windows.exe .

      - name: Build launcher macOS
        run: |
          cd launcher
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -o FRACTURE-Launcher-macOS .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer and launchers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/FRACTURE-Setup.exe
            launcher/FRACTURE-Launcher-Windows.exe
            launcher/FRACTURE-Launcher-macOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

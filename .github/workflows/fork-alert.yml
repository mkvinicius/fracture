name: Fork Alert

on:
  fork:

jobs:
  alert:
    name: New Fork Detected
    runs-on: ubuntu-latest

    steps:
      - name: Log fork event
        uses: actions/github-script@v7
        with:
          script: |
            const forkOwner = context.payload.forkee?.owner?.login || 'unknown';
            const forkRepo  = context.payload.forkee?.full_name  || 'unknown';
            const forkUrl   = context.payload.forkee?.html_url   || '';

            const message = [
              `🍴 **New Fork Detected**`,
              ``,
              `- **Forked by:** ${forkOwner}`,
              `- **Fork URL:** ${forkUrl}`,
              `- **Time:** ${new Date().toISOString()}`,
              ``,
              `FRACTURE is licensed under AGPL-3.0. Any derivative work must:`,
              `1. Keep the AGPL-3.0 license`,
              `2. Disclose source code of modifications`,
              `3. Preserve copyright notices`,
            ].join('\n');

            core.notice(message);
            console.log(message);

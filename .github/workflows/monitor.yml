name: Repository Monitor

on:
  # Run every Monday at 9:00 UTC
  schedule:
    - cron: "0 9 * * 1"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  monitor:
    name: Weekly Activity Report
    runs-on: ubuntu-latest

    steps:
      - name: Fetch repository stats
        id: stats
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 10,
            });

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
            });

            const latestRelease = releases.length > 0 ? releases[0].tag_name : 'none';
            const openIssues = issues.filter(i => !i.pull_request);
            const openPRs   = issues.filter(i =>  i.pull_request);

            const summary = [
              `## FRACTURE — Weekly Activity Report`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| ⭐ Stars | ${repo.stargazers_count} |`,
              `| 🍴 Forks | ${repo.forks_count} |`,
              `| 👀 Watchers | ${repo.watchers_count} |`,
              `| 🐛 Open Issues | ${openIssues.length} |`,
              `| 🔀 Open PRs | ${openPRs.length} |`,
              `| 🏷️ Latest Release | ${latestRelease} |`,
              ``,
              `### Open Issues`,
              ...openIssues.map(i => `- [#${i.number}](${i.html_url}) ${i.title}`),
              ``,
              `### Open Pull Requests`,
              ...openPRs.map(p => `- [#${p.number}](${p.html_url}) ${p.title}`),
            ].join('\n');

            core.setOutput('summary', summary);
            core.notice(summary);

      - name: Create issue if there are open items
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.stats.outputs.summary }}`;
            console.log('Weekly monitor complete.');
            console.log(summary);
            // To post as an issue, uncomment below and add write permissions:
            // await github.rest.issues.create({
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   title: `[Monitor] Weekly Activity — ${new Date().toISOString().split('T')[0]}`,
            //   body: summary,
            //   labels: ['monitor'],
            // });
